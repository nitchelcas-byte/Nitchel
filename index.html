const toKey = (d) => d.toISOString().slice(0, 10);

const getWeekDays = (off = 0) => {
  const days = [], now = new Date(), mon = new Date(now);
  mon.setDate(now.getDate() - ((now.getDay() + 6) % 7) + off * 7);
  for (let i = 0; i < 7; i++) { const d = new Date(mon); d.setDate(mon.getDate() + i); days.push(d); }
  return days;
};
const getMonthDays = (y, m) => {
  const days = [], d = new Date(y, m, 1);
  while (d.getMonth() === m) { days.push(new Date(d)); d.setDate(d.getDate() + 1); }
  return days;
};

// ── log helpers ────────────────────────────────────────────────────────────────
const emptyDay = () => ({
  water:0, wake:null,
  exercises:{ cardio:false, pesas_sup:false, pesas_inf:false, gluteos:false, abdomen:false },
  mealLogs:{}, extraFoods:[],
  sleep:{ bedtime:null, quality:0 },
  reading:{ done:false, pages:0 },
  meditation:{ done:false, minutes:0 },
  skincare:false,
  journaling:false,
});
const getLog = (logs, key) => { const d = logs[key]; return d ? { ...emptyDay(), ...d } : emptyDay(); };
const getMealLog = (log, id) => log.mealLogs?.[id] || { logged:false, skippedTraining:false, failed:false, partial:false, items:{}, note:"" };
const trained = (log) => Object.values(log.exercises || {}).some(Boolean);

const calcDayQuality = (log) => {
  const statuses = MAIN_MEALS.map(id => {
    const m = getMealLog(log, id);
    if (!m.logged) return "pending";
    if (m.failed) return "bad";
    if (m.partial) return "partial";
    return "good";
  });
  const bad = statuses.filter(s => s === "bad").length;
  const partial = statuses.filter(s => s === "partial").length;
  const extras = (log.extraFoods || []).length;
  if (statuses.every(s => s === "pending")) return "pending";
  if (bad === 0 && partial === 0 && extras === 0) return "good";
  if (bad >= 2 || (bad >= 1 && extras >= 1)) return "bad";
  return "regular";
};

  pending: { label:"En progreso", color:"#ffffff50", bg:"rgba(255,255,255,.03)", border:"rgba(255,255,255,.08)", emoji:"⏳" },
};

const calcMacros = (log, meals) => {
  const c = { proteina:0, carbo:0, grasa_buena:0, grasa_mala:0, azucar:0, fruta:0, verdura:0 };
  const fN = new Set(), vN = new Set();
  meals.forEach(meal => {
    const ml = getMealLog(log, meal.id);
    meal.foodCategories.forEach(cat => {
      ((ml.items || {})[cat.id] || []).forEach(item => {
        const mt = item.macroOverride || cat.macroType;
        if (mt && c[mt] !== undefined) c[mt] += 1; // 1 porcion por item
        if (mt === "fruta") fN.add(item.name.toLowerCase().trim());
        if (mt === "verdura") vN.add(item.name.toLowerCase().trim());
      });
    });
  });
  (log.extraFoods || []).forEach(e => {
    if (e.macroType && c[e.macroType] !== undefined) c[e.macroType] += 1;
    if (e.macroType === "fruta") fN.add(e.name.toLowerCase().trim());
    if (e.macroType === "verdura") vN.add(e.name.toLowerCase().trim());
  });
  return { ...c, fruitNames:[...fN], veggieNames:[...vN] };
};

// Calcula variedad semanal de frutas y verduras (nombres únicos en toda la semana)
const calcWeeklyVariety = (logs) => {
  const fruitSet = new Set(), veggieSet = new Set();
  const weekDays = getWeekDays(0);
  weekDays.forEach(d => {
    const log = getLog(logs, toKey(d));
    DEFAULT_MEALS.forEach(meal => {
      const ml = getMealLog(log, meal.id);
      meal.foodCategories.forEach(cat => {
        ((ml.items || {})[cat.id] || []).forEach(item => {
          const mt = item.macroOverride || cat.macroType;
          if (mt === "fruta") fruitSet.add(item.name.toLowerCase().trim());
          if (mt === "verdura") veggieSet.add(item.name.toLowerCase().trim());
        });
      });
    });
    (log.extraFoods || []).forEach(e => {
      if (e.macroType === "fruta") fruitSet.add(e.name.toLowerCase().trim());
      if (e.macroType === "verdura") veggieSet.add(e.name.toLowerCase().trim());
    });
  });
  return { fruitVariety:[...fruitSet], veggieVariety:[...veggieSet] };
};

// ── Arc ────────────────────────────────────────────────────────────────────────
function Arc({ value, max, color, size=60, sw=5, children }) {
  const r = (size - sw) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - Math.min(value / max, 1));
  return (
    <div style={{ position:"relative", width:size, height:size }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)", position:"absolute" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#ffffff07" strokeWidth={sw}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{ transition:"stroke-dashoffset .5s cubic-bezier(.4,0,.2,1)" }}/>
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
        {children}
      </div>
    </div>
  );
}

      </div>

  );
}

          {custom ? "cerrar" : "+ otro"}
        </div>
      </div>

      {custom && (
        <div style={{ display:"flex", gap:5, marginTop:5 }}>
          <input value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && commit(name, qty)}
            placeholder="Alimento..."
            style={{ flex:1, padding:"7px 9px", borderRadius:8, border:"1px solid rgba(255,255,255,.1)", background:"rgba(255,255,255,.05)", color:"#e4ddd4", fontSize:12, outline:"none" }}/>
          <input value={qty} onChange={e => setQty(e.target.value)}
            placeholder={category.unit ? "Cant. (" + category.unit + ")" : "Cant."}
            style={{ width:72, padding:"7px", borderRadius:8, border:"1px solid rgba(255,255,255,.07)", background:"rgba(255,255,255,.04)", color:"#e4ddd4", fontSize:11, outline:"none" }}/>
          <button onClick={() => commit(name, qty)} style={{ padding:"7px 11px", borderRadius:8, border:"1px solid rgba(255,255,255,.15)", background:"rgba(255,255,255,.1)", color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer" }}>+</button>
        </div>
      )}

      {showLib && (
        <LibraryModal library={library} categoryLabel={category.label} color={mealColor}
          onClose={() => setShowLib(false)}
          onSelect={f => commit(f)}
          onDelete={onLibDelete}/>
      )}
      {showEdit && (
        <EditModal suggestions={suggestions} categoryLabel={category.label} color={mealColor}
          onClose={() => setShowEdit(false)}
          onSave={list => { onEditSugg(list); setShowEdit(false); }}/>
      )}
    </div>
  );
}

// ── MealCard ───────────────────────────────────────────────────────────────────
function MealCard({ meal, mealLog, onChange, idx, customSug, onUpdateSug, foodLib, onSaveLib }) {
  const [open, setOpen] = useState(false);
  const isSkip = mealLog.skippedTraining;
  const isBad  = mealLog.logged && mealLog.failed;
  const isPart = mealLog.logged && mealLog.partial && !mealLog.failed;
  const isGood = mealLog.logged && !mealLog.failed && !mealLog.partial && !isSkip;
  const allItems = meal.foodCategories.reduce((a, c) => a + ((mealLog.items || {})[c.id] || []).length, 0);

  const border = isSkip ? "rgba(148,163,184,.2)" : isBad ? "#f87171" : isPart ? "#fbbf24" : isGood ? meal.color : "rgba(255,255,255,.06)";

  const setS = (s) => {
    if (s === "skip")    return onChange({ ...mealLog, skippedTraining:true,  logged:true,  failed:false, partial:false });
    if (s === "good")    return onChange({ ...mealLog, skippedTraining:false, logged:true,  failed:false, partial:false });
    if (s === "partial") return onChange({ ...mealLog, skippedTraining:false, logged:true,  failed:false, partial:true  });
    if (s === "bad")     return onChange({ ...mealLog, skippedTraining:false, logged:true,  failed:true,  partial:false });
    onChange({ ...mealLog, logged:false, failed:false, partial:false, skippedTraining:false });
  };

  const addItem = (cid, item) => {
    const cur = mealLog.items || {};
    onChange({ ...mealLog, items:{ ...cur, [cid]:[...(cur[cid] || []), item] } });
  };
  const remItem = (cid, iid) => {
    const cur = mealLog.items || {};
    onChange({ ...mealLog, items:{ ...cur, [cid]:(cur[cid] || []).filter(i => i.id !== iid) } });
  };
  const setOverride = (cid, iid, mt) => {
    const cur = mealLog.items || {};
    onChange({ ...mealLog, items:{ ...cur, [cid]:(cur[cid] || []).map(i => i.id === iid ? { ...i, macroOverride:mt || null } : i) } });
  };

  const labelColor = isSkip ? "#94a3b8" : isGood ? meal.color : isBad ? "#f87171" : isPart ? "#fbbf24" : "#ffffff65";

  return (
    <div style={{ borderRadius:19, border:"1.5px solid " + border, background:isGood || isBad || isPart ? border + "0e" : "rgba(255,255,255,.02)", overflow:"hidden", transition:"all .3s", animation:"slideUp .3s " + (idx * 0.03) + "s ease both", boxShadow:isGood ? "0 0 18px " + meal.color + "12" : "none" }}>
      
      <div onClick={() => setOpen(o => !o)} style={{ display:"flex", alignItems:"center", gap:11, padding:"12px 14px", cursor:"pointer", background:meal.bg }}>
        <div style={{ width:40, height:40, borderRadius:11, flexShrink:0, background:isGood ? meal.color + "25" : isSkip ? "rgba(148,163,184,.08)" : isBad ? "rgba(248,113,113,.08)" : "rgba(255,255,255,.04)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, transition:"all .3s" }}>
          {isSkip ? "😴" : meal.emoji}
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:5, flexWrap:"wrap" }}>
            <span style={{ fontSize:13, fontWeight:700, color:labelColor }}>{meal.label}</span>
            {isSkip && <span style={{ fontSize:9, color:"#94a3b8", background:"rgba(148,163,184,.1)", borderRadius:99, padding:"1px 6px", fontWeight:700 }}>sin entreno</span>}
            {isGood && <span style={{ fontSize:9, color:meal.color, background:meal.color + "18", borderRadius:99, padding:"1px 6px", fontWeight:700 }}>bien</span>}
            {isPart && <span style={{ fontSize:9, color:"#fbbf24", background:"#fbbf2418", borderRadius:99, padding:"1px 6px", fontWeight:700 }}>parcial</span>}
            {isBad  && <span style={{ fontSize:9, color:"#f87171", background:"#f8717118", borderRadius:99, padding:"1px 6px", fontWeight:700 }}>mal</span>}
          </div>
          <div style={{ fontSize:10, color:"#ffffff28", marginTop:1 }}>{meal.time} — {meal.hint}</div>
          {allItems > 0 && <div style={{ fontSize:9, color:"#ffffff30", marginTop:1 }}>{"📋 " + plural(allItems, "alimento")}</div>}
        </div>
        <div style={{ fontSize:16, color:"#ffffff18", transition:"transform .2s", transform:open ? "rotate(180deg)" : "none", flexShrink:0 }}>v</div>
      </div>

      {open && (
        <div style={{ padding:"14px", background:"rgba(0,0,0,.38)", borderTop:"1px solid rgba(255,255,255,.04)" }}>
          
          <div style={{ marginBottom:13 }}>
            <div style={{ fontSize:9, color:"#ffffff20", letterSpacing:2, textTransform:"uppercase", fontWeight:600, marginBottom:7 }}>Como te fue?</div>
            <div style={{ display:"grid", gridTemplateColumns:meal.canSkipTraining ? "repeat(4,1fr)" : "repeat(3,1fr)", gap:5 }}>
              {[
                { s:"good",    l:"Bien",       c:"#4ade80" },
                { s:"partial", l:"Parcial",    c:"#fbbf24" },
                { s:"bad",     l:"Mal",        c:"#f87171" },
                ...(meal.canSkipTraining ? [{ s:"skip", l:"Sin entreno", c:"#94a3b8" }] : [])
              ].map(btn => {
                const active = (btn.s==="good" && isGood) || (btn.s==="partial" && isPart) || (btn.s==="bad" && isBad) || (btn.s==="skip" && isSkip);
                return (
                  <button key={btn.s} onClick={() => setS(active ? null : btn.s)} style={{ padding:"7px 3px", borderRadius:9, border:"1.5px solid " + (active ? btn.c + "60" : "rgba(255,255,255,.06)"), background:active ? btn.c + "18" : "rgba(255,255,255,.02)", color:active ? btn.c : "#ffffff28", fontSize:10, fontWeight:active ? 700 : 500, cursor:"pointer", transition:"all .2s" }}>
                    {btn.l}
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{ borderTop:"1px solid rgba(255,255,255,.05)", paddingTop:12, marginBottom:3 }}>
            <div style={{ fontSize:9, color:"#ffffff20", letterSpacing:2, textTransform:"uppercase", fontWeight:600, marginBottom:11 }}>Registrar alimentos</div>
            {meal.foodCategories.map(cat => {
              const catItems = (mealLog.items || {})[cat.id] || [];
              const key = meal.id + "_" + cat.id;
              const sugg = customSug[key] || cat.suggestions;
              const lib = foodLib[key] || [];
              return (
                <div key={cat.id}>
                  <AddFoodForm category={cat} mealColor={meal.color} suggestions={sugg} library={lib}
                    onAdd={item => addItem(cat.id, item)}
                    onSaveLib={name => onSaveLib(key, name)}
                    onLibDelete={name => onSaveLib(key, name, true)}
                    onEditSugg={list => onUpdateSug(key, list)}/>
                  {catItems.length > 0 && (
                    <div style={{ display:"flex", flexDirection:"column", gap:4, marginBottom:10 }}>
                      {catItems.map(item => {
                        const mt = item.macroOverride || cat.macroType;
                        const M = mt ? MACRO_TYPES.find(x => x.id === mt) : null;
                        return (
                          <div key={item.id} style={{ display:"flex", alignItems:"center", gap:7, padding:"6px 9px", borderRadius:8, background:"rgba(255,255,255,.05)", border:"1px solid rgba(255,255,255,.06)" }}>
                            <div style={{ flex:1 }}>
                              <span style={{ fontSize:11, color:"#e4ddd4", fontWeight:600 }}>{item.name}</span>
                              {item.qty && <span style={{ fontSize:10, color:"#ffffff38", marginLeft:4 }}>{item.qty} {item.unit}</span>}
                            </div>
                            {M && <span style={{ fontSize:8, color:M.color, background:M.color + "15", borderRadius:99, padding:"2px 6px", fontWeight:700, flexShrink:0 }}>{M.emoji} {M.label}</span>}
                            <select onChange={e => setOverride(cat.id, item.id, e.target.value)} value={item.macroOverride || ""}
                              style={{ fontSize:9, background:"rgba(255,255,255,.05)", border:"1px solid rgba(255,255,255,.08)", color:"#ffffff40", borderRadius:5, padding:"2px 3px", cursor:"pointer", maxWidth:70 }}>
                              <option value="">auto</option>
                              {MACRO_TYPES.map(x => <option key={x.id} value={x.id}>{x.emoji} {x.label}</option>)}
                            </select>
                            <div onClick={() => remItem(cat.id, item.id)} style={{ color:"#ffffff20", fontSize:13, cursor:"pointer", padding:"1px 4px", flexShrink:0 }}>x</div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          <div style={{ borderTop:"1px solid rgba(255,255,255,.04)", paddingTop:10 }}>
            <textarea value={mealLog.note || ""} onChange={e => onChange({ ...mealLog, note:e.target.value })}
              placeholder="Notas..." rows={2}
              style={{ width:"100%", padding:"7px 10px", borderRadius:9, border:"1px solid rgba(255,255,255,.06)", background:"rgba(255,255,255,.04)", color:"#e4ddd4", fontSize:11, resize:"none", outline:"none", boxSizing:"border-box" }}/>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ExtraLogger ────────────────────────────────────────────────────────────────
function ExtraLogger({ extras=[], onChange, foodLib, onSaveLib }) {
  const [name, setName] = useState("");
  const [qty,  setQty]  = useState("");
  const [time, setTime] = useState("");
  const [mt,   setMt]   = useState("grasa_mala");
  const [open, setOpen] = useState(false);
  const lib = foodLib["extras"] || [];

  const add = () => {
    if (!name.trim()) return;
    onChange([...extras, { name:name.trim(), qty:qty.trim(), time:time.trim(), macroType:mt, id:Date.now() }]);
    onSaveLib("extras", name.trim());
    setName(""); setQty(""); setTime(""); setOpen(false);
  };

  return (
    <div style={{ background:"rgba(248,113,113,.05)", borderRadius:17, padding:"14px", border:"1px solid rgba(248,113,113,.16)" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
        <div style={{ fontSize:10, color:"#f87171", letterSpacing:2, textTransform:"uppercase", fontWeight:700 }}>Antojos / extras</div>
        <button onClick={() => setOpen(o => !o)} style={{ fontSize:10, padding:"3px 10px", borderRadius:7, border:"1px solid rgba(248,113,113,.3)", background:"rgba(248,113,113,.1)", color:"#f87171", cursor:"pointer", fontWeight:700 }}>
          {open ? "cerrar" : "+ agregar"}
        </button>
      </div>
      <div style={{ fontSize:10, color:"#ffffff22", marginBottom:extras.length > 0 ? 10 : 0 }}>
        Cada antojo afecta la calificacion y los macros del dia.
      </div>

      {extras.length > 0 && (
        <div style={{ display:"flex", flexDirection:"column", gap:5, marginBottom:10 }}>
          {extras.map(e => {
            const AT = ANTOJO_TYPES.find(a => a.id === e.macroType) || ANTOJO_TYPES[ANTOJO_TYPES.length - 1];
            return (
              <div key={e.id} style={{ display:"flex", alignItems:"center", gap:7, padding:"7px 10px", borderRadius:9, background:"rgba(248,113,113,.07)", border:"1px solid rgba(248,113,113,.13)" }}>
                <span style={{ fontSize:15 }}>{AT.emoji}</span>
                <div style={{ flex:1 }}>
                  <span style={{ fontSize:12, color:"#fca5a5", fontWeight:600 }}>{e.name}</span>
                  {e.qty && <span style={{ fontSize:10, color:"#f8717165", marginLeft:4 }}>{e.qty}</span>}
                  {e.time && <span style={{ fontSize:9, color:"#ffffff22", marginLeft:4 }}>{e.time}</span>}
                  <span style={{ fontSize:8, color:AT.color, background:AT.color + "18", borderRadius:99, padding:"1px 6px", marginLeft:5, fontWeight:700 }}>{AT.label}</span>
                </div>
                <div onClick={() => onChange(extras.filter(x => x.id !== e.id))} style={{ color:"#f87171", fontSize:13, cursor:"pointer", padding:"2px 5px", borderRadius:5, background:"rgba(248,113,113,.1)" }}>x</div>
              </div>
            );
          })}
        </div>
      )}

      {open && (
        <div style={{ background:"rgba(0,0,0,.2)", borderRadius:11, padding:"11px", display:"flex", flexDirection:"column", gap:8, marginTop:8 }}>
          <div>
            <div style={{ fontSize:9, color:"#ffffff25", marginBottom:5, fontWeight:600, letterSpacing:1 }}>TIPO DE ANTOJO</div>
            <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
              {ANTOJO_TYPES.map(a => (
                <div key={a.id} onClick={() => setMt(a.id)}
                  style={{ padding:"4px 9px", borderRadius:99, fontSize:10, cursor:"pointer", background:mt === a.id ? a.color + "22" : "rgba(255,255,255,.04)", border:"1px solid " + (mt === a.id ? a.color + "55" : "rgba(255,255,255,.06)"), color:mt === a.id ? a.color : "#ffffff30", fontWeight:mt === a.id ? 700 : 400 }}>
                  {a.emoji} {a.label}
                </div>
              ))}
            </div>
          </div>
          {lib.length > 0 && (
            <div>
              <div style={{ fontSize:9, color:"#ffffff22", marginBottom:4, fontWeight:600, letterSpacing:1 }}>GUARDADOS</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:3 }}>
                {lib.map((f, i) => (
                  <div key={i} onClick={() => setName(f)}
                    style={{ padding:"3px 8px", borderRadius:99, fontSize:10, cursor:"pointer", background:name === f ? "rgba(248,113,113,.18)" : "rgba(255,255,255,.04)", border:"1px solid " + (name === f ? "rgba(248,113,113,.35)" : "rgba(255,255,255,.06)"), color:name === f ? "#f87171" : "#ffffff28" }}>
                    {f}
                  </div>
                ))}
              </div>
            </div>
          )}
          <div style={{ display:"flex", gap:5 }}>
            <input value={time} onChange={e => setTime(e.target.value)} placeholder="Hora"
              style={{ width:52, padding:"7px 6px", borderRadius:7, border:"1px solid rgba(248,113,113,.18)", background:"rgba(255,255,255,.04)", color:"#e4ddd4", fontSize:10, outline:"none" }}/>
            <input value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && add()}
              placeholder="Que comiste?"
              style={{ flex:1, padding:"7px 9px", borderRadius:7, border:"1px solid rgba(248,113,113,.18)", background:"rgba(255,255,255,.04)", color:"#e4ddd4", fontSize:11, outline:"none" }}/>
            <input value={qty} onChange={e => setQty(e.target.value)} placeholder="Cant."
              style={{ width:52, padding:"7px 6px", borderRadius:7, border:"1px solid rgba(248,113,113,.18)", background:"rgba(255,255,255,.04)", color:"#e4ddd4", fontSize:10, outline:"none" }}/>
            <button onClick={add} style={{ padding:"7px 11px", borderRadius:7, border:"1px solid rgba(248,113,113,.35)", background:"rgba(248,113,113,.13)", color:"#f87171", fontSize:14, fontWeight:700, cursor:"pointer", flexShrink:0 }}>+</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── MacroDash ──────────────────────────────────────────────────────────────────
function MacroDash({ macros, weeklyVariety }) {
  const [tab, setTab] = useState("macros");

  return (
    <div style={{ background:"rgba(255,255,255,.02)", borderRadius:19, padding:"15px", border:"1px solid rgba(255,255,255,.06)" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:13 }}>
        <div style={{ fontSize:11, color:"#ffffff35", letterSpacing:2, textTransform:"uppercase", fontWeight:700 }}>Resumen nutricional</div>
        <div style={{ display:"flex", background:"rgba(255,255,255,.04)", borderRadius:8, padding:3, gap:2 }}>
          {[["macros","Macros"],["plantas","Variedad semanal"]].map(([t, l]) => (
            <button key={t} onClick={() => setTab(t)} style={{ padding:"4px 9px", borderRadius:6, border:"none", cursor:"pointer", background:tab === t ? "rgba(255,255,255,.1)" : "none", color:tab === t ? "#fff" : "#ffffff28", fontSize:10, fontWeight:tab === t ? 700 : 500 }}>{l}</button>
          ))}
        </div>
      </div>

      {tab === "macros" && (
        <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
          {MACRO_TYPES.filter(m => !["fruta","verdura"].includes(m.id)).map(M => {
            const val = macros[M.id] || 0;
            const goal = M.goal;
            const pct = Math.min(val / goal * 100, 100);
            const isWarn = (M.id === "grasa_mala" || M.id === "azucar") && val > goal;
            const isGood = !isWarn && val >= goal;
            return (
              <div key={M.id}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5 }}>
                  <span style={{ fontSize:12, color:M.color, fontWeight:600 }}>{M.emoji} {M.label}</span>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    {/* dot indicators */}
                    <div style={{ display:"flex", gap:3 }}>
                      {Array.from({ length: goal }).map((_, i) => (
                        <div key={i} style={{ width:10, height:10, borderRadius:"50%", background: i < val ? (isWarn ? "#f87171" : M.color) : "rgba(255,255,255,.08)", border:"1px solid " + (i < val ? (isWarn ? "#f87171" : M.color) : "rgba(255,255,255,.05)"), transition:"all .3s" }}/>
                      ))}
                    </div>
                    <span style={{ fontSize:11, color:isWarn ? "#f87171" : isGood ? M.color : "#ffffff40", fontWeight:700, minWidth:28, textAlign:"right" }}>
                      {val}/{goal}
                    </span>
                  </div>
                </div>
                <div style={{ height:4, background:"rgba(255,255,255,.04)", borderRadius:99, overflow:"hidden" }}>
                  <div style={{ width:pct + "%", height:"100%", background:isWarn ? "#f87171" : M.color, borderRadius:99, transition:"width .5s" }}/>
                </div>
              </div>
            );
          })}
          <div style={{ fontSize:9, color:"#ffffff12", textAlign:"center", marginTop:2 }}>
            Porciones del dia de hoy registradas.
          </div>
        </div>
      )}

      {tab === "plantas" && (
        <div>
          <div style={{ fontSize:10, color:"#ffffff30", marginBottom:12, lineHeight:1.5 }}>
            Variedad de frutas y verduras distintas que has comido esta semana.
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:9, marginBottom:12 }}>
            {[
              { label:"Frutas",   names:weeklyVariety.fruitVariety  || [], color:"#fb7185", emoji:"🍎", goal:5  },
              { label:"Verduras", names:weeklyVariety.veggieVariety || [], color:"#34d399", emoji:"🥦", goal:7  },
            ].map(p => (
              <div key={p.label} style={{ background:p.color + "0d", borderRadius:13, padding:"11px", border:"1px solid " + p.color + "25" }}>
                <div style={{ fontSize:10, color:p.color, fontWeight:700, marginBottom:5 }}>{p.emoji} {p.label}</div>
                <div style={{ display:"flex", alignItems:"baseline", gap:3, marginBottom:6 }}>
                  <span style={{ fontSize:28, fontWeight:700, color:p.color, lineHeight:1 }}>{p.names.length}</span>
                  <span style={{ fontSize:10, color:p.color + "70" }}>/ {p.goal} tipos</span>
                </div>
                <div style={{ height:3, background:"rgba(255,255,255,.05)", borderRadius:99, overflow:"hidden", marginBottom:8 }}>
                  <div style={{ width:Math.min(p.names.length / p.goal * 100, 100) + "%", height:"100%", background:p.color, borderRadius:99, transition:"width .5s" }}/>
                </div>
                {p.names.length > 0 ? (
                  <div style={{ display:"flex", flexWrap:"wrap", gap:3 }}>
                    {p.names.map((n, i) => (
                      <span key={i} style={{ fontSize:9, padding:"2px 7px", borderRadius:99, background:p.color + "20", color:p.color, fontWeight:600, textTransform:"capitalize" }}>{n}</span>
                    ))}
                  </div>
                ) : (
                  <div style={{ fontSize:9, color:"#ffffff18" }}>Ninguna esta semana</div>
                )}
              </div>
            ))}
          </div>
          <div style={{ background:"rgba(255,255,255,.02)", borderRadius:11, padding:"9px 11px", border:"1px solid rgba(255,255,255,.05)" }}>
            <div style={{ fontSize:10, color:"#ffffff30", fontWeight:600, marginBottom:4 }}>Tip semanal</div>
            <div style={{ fontSize:11, color:"#ffffff35", lineHeight:1.5 }}>
              {weeklyVariety.fruitVariety.length + weeklyVariety.veggieVariety.length === 0
                ? "Esta semana aun no has registrado frutas ni verduras."
                : weeklyVariety.veggieVariety.length < 3
                  ? "Intenta agregar mas variedad de verduras esta semana."
                  : "Excelente variedad de plantas esta semana!"}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Streak helper ──────────────────────────────────────────────────────────────
const calcStreak = (logs, checkFn) => {
  let streak = 0;
  const d = new Date();
  // if today not done yet, start from yesterday
  const todK = toKey(d);
  if (!checkFn(getLog(logs, todK))) d.setDate(d.getDate() - 1);
  while (true) {
    const k = toKey(d);
    if (!checkFn(getLog(logs, k))) break;
    streak++;
    d.setDate(d.getDate() - 1);
    if (streak > 365) break;
  }
  return streak;
};

// ── ReadingLibrary ─────────────────────────────────────────────────────────────
// ── ReadingStats ───────────────────────────────────────────────────────────────
function ReadingStats({ books }) {
  const [period, setPeriod] = useState("week");
  const [weekOff, setWeekOff] = useState(0);
  const [monthVal, setMonthVal] = useState(() => {
    const n = new Date(); return n.getFullYear() + "-" + String(n.getMonth()+1).padStart(2,"0");
  });

  const getDays = () => {
    if (period === "week") return getWeekDays(weekOff);
    const [y,m] = monthVal.split("-").map(Number);
    return getMonthDays(y, m-1);
  };

  const days = getDays();
  const dayKeys = new Set(days.map(d => toKey(d)));

  // Pages read per day in range (from pageHistory)
  const pagesPerDay = {};
  days.forEach(d => { pagesPerDay[toKey(d)] = 0; });
  (books||[]).forEach(b => {
    (b.pageHistory||[]).forEach(h => { if (dayKeys.has(h.date)) pagesPerDay[h.date] = (pagesPerDay[h.date]||0) + (h.pages||0); });
  });

  const totalPages = Object.values(pagesPerDay).reduce((s,v)=>s+v,0);
  const readDays   = Object.values(pagesPerDay).filter(v=>v>0).length;
  const maxPages   = Math.max(...Object.values(pagesPerDay), 1);

  // Books finished in range
  const finished = (books||[]).filter(b => b.finishedDate && dayKeys.has(b.finishedDate));
  // Books with progress in range (had sessions)
  const active = (books||[]).filter(b => (b.pageHistory||[]).some(h => dayKeys.has(h.date)));
  // avg progress per active book
  const avgPct = active.length > 0
    ? Math.round(active.reduce((s,b) => {
        const pct = b.totalPages > 0 ? Math.min((b.currentPage||0)/b.totalPages*100,100) : 0;
        return s + pct;
      },0) / active.length)
    : 0;

  const periodLabel = period === "week"
    ? (weekOff===0?"Esta semana":weekOff===-1?"Semana pasada":"Hace "+Math.abs(weekOff)+" sem.")
    : (() => { const [y,m]=monthVal.split("-").map(Number); return MONTH_ES[m-1]+" "+y; })();

  const barDays = period === "week" ? days : days.filter((_,i)=>i%Math.ceil(days.length/14)===0);

  return (
    <div style={{ background:"linear-gradient(135deg,#0f0f1a,#131228)", borderRadius:20, padding:"18px", border:"1px solid rgba(167,139,250,.15)", marginBottom:14 }}>
      <div style={{ fontSize:11, letterSpacing:2, color:"#a78bfa60", textTransform:"uppercase", fontWeight:600, marginBottom:10 }}>Resumen de lectura</div>

      {/* Period selector */}
      <div style={{ display:"flex", gap:6, marginBottom:12 }}>
        {[["week","Semana"],["month","Mes"]].map(([p,l]) => (
          <button key={p} onClick={() => setPeriod(p)}
            style={{ flex:1, padding:"7px", borderRadius:9, border:"1px solid "+(period===p?"#a78bfa50":"rgba(255,255,255,.07)"), background:period===p?"rgba(167,139,250,.1)":"rgba(255,255,255,.02)", color:period===p?"#a78bfa":"#ffffff30", fontSize:11, fontWeight:period===p?700:500, cursor:"pointer" }}>
            {l}
          </button>
        ))}
      </div>

      {/* Navigator */}
      {period === "week" ? (
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
          <button onClick={() => setWeekOff(o=>o-1)} style={{ width:32, height:32, borderRadius:8, border:"1px solid rgba(255,255,255,.09)", background:"rgba(255,255,255,.04)", color:"#fff", fontSize:14, cursor:"pointer" }}>{"<"}</button>
          <div style={{ flex:1, textAlign:"center", fontSize:12, fontWeight:600, color:"#fff" }}>{periodLabel}</div>
          <button onClick={() => setWeekOff(o=>Math.min(0,o+1))} style={{ width:32, height:32, borderRadius:8, border:"1px solid rgba(255,255,255,.09)", background:"rgba(255,255,255,.04)", color:weekOff<0?"#fff":"#ffffff20", fontSize:14, cursor:"pointer" }}>{">"}</button>
        </div>
      ) : (
        <input type="month" value={monthVal} max={new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0")}
          onChange={e=>setMonthVal(e.target.value)}
          style={{ width:"100%", padding:"7px 10px", borderRadius:9, border:"1px solid rgba(255,255,255,.1)", background:"rgba(255,255,255,.05)", color:"#e4ddd4", fontSize:12, outline:"none", boxSizing:"border-box", colorScheme:"dark", marginBottom:14 }}/>
      )}

      {/* Summary stats */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:14 }}>
        {[
          { label:"Paginas leidas", val:totalPages, color:"#4ade80", emoji:"📖" },
          { label:"Dias activos",   val:readDays + "/" + days.length, color:"#38bdf8", emoji:"📅" },
          { label:"Libros terminados", val:finished.length, color:"#fbbf24", emoji:"✅" },
        ].map((s,i) => (
          <div key={i} style={{ background:"rgba(255,255,255,.03)", borderRadius:12, padding:"10px 8px", textAlign:"center", border:"1px solid "+s.color+"20" }}>
            <div style={{ fontSize:16, marginBottom:3 }}>{s.emoji}</div>
            <div style={{ fontSize:17, fontWeight:700, color:s.color }}>{s.val}</div>
            <div style={{ fontSize:8, color:"#ffffff30", marginTop:2, lineHeight:1.3 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Bar chart — pages per day */}
      {totalPages > 0 && (
        <div>
          <div style={{ fontSize:9, color:"#ffffff25", marginBottom:6 }}>Paginas por dia</div>
          <div style={{ display:"flex", alignItems:"flex-end", gap:period==="month"?2:4, height:50 }}>
            {days.map((d,i) => {
              const k = toKey(d);
              const v = pagesPerDay[k] || 0;
              const h = v > 0 ? Math.max(4, Math.round(v/maxPages*46)) : 2;

                <div key={k} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>

                </div>
              );
            })}
          </div>
          {active.length > 0 && period==="week" && (
            <div style={{ marginTop:10, display:"flex", flexDirection:"column", gap:5 }}>
              <div style={{ fontSize:9, color:"#ffffff25", marginBottom:2 }}>Avance esta semana</div>
              {active.map(b => {
                const pct = b.totalPages > 0 ? Math.min((b.currentPage||0)/b.totalPages*100,100) : 0;
                const wPages = (b.pageHistory||[]).filter(h=>dayKeys.has(h.date)).reduce((s,h)=>s+(h.pages||0),0);
                if (wPages === 0) return null;
                return (
                  <div key={b.id} style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ fontSize:10, color:"#ffffff50", flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{b.title}</div>

                      <div style={{ width:60, height:4, background:"rgba(255,255,255,.06)", borderRadius:99, flexShrink:0 }}>
                        <div style={{ width:pct+"%", height:"100%", background:"#4ade80", borderRadius:99 }}/>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
          {finished.length > 0 && (
            <div style={{ marginTop:10 }}>
              <div style={{ fontSize:9, color:"#fbbf2450", marginBottom:5 }}>Terminados este periodo</div>
              {finished.map(b => (
                <div key={b.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 10px", background:"rgba(251,191,36,.06)", borderRadius:9, border:"1px solid rgba(251,191,36,.15)", marginBottom:4 }}>

                    <div style={{ fontSize:11, fontWeight:700, color:"#fbbf24" }}>{b.title}</div>
                    {b.startDate && b.finishedDate && (
                      <div style={{ fontSize:9, color:"#ffffff30" }}>
                        {Math.max(1,Math.round((new Date(b.finishedDate+"T12:00:00")-new Date(b.startDate+"T12:00:00"))/86400000)) + " dias"}
                      </div>
                    )}
                  </div>
                  <span style={{ fontSize:14 }}>{"✅"}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      {totalPages === 0 && (
        <div style={{ textAlign:"center", padding:"16px 0", color:"#ffffff18", fontSize:12 }}>
          Sin sesiones de lectura en este periodo
        </div>
      )}
    </div>
  );
}

function ReadingLibrary({ books, onChange }) {

    if (!form.title.trim()) return;
    const tp = parseInt(form.totalPages)||0;
    const cp = parseInt(form.currentPage)||0;
    if (editId) {
      onChange(books.map(b => {
        if (b.id !== editId) return b;
        const updated = { ...b, ...form, totalPages:tp, currentPage:cp };
        if (!b.startDate && form.status === "reading") updated.startDate = todayKey();
        if (tp > 0 && cp >= tp && !b.finishedDate) updated.finishedDate = todayKey();
        if (tp > 0 && cp >= tp) updated.status = "done";
        return updated;
      }));
      setEditId(null);
    } else {
      const newBook = { ...form, id:Date.now(), totalPages:tp, currentPage:cp, reflections:[], pageHistory:[], addedDate:todayKey() };
      if (form.status === "reading") newBook.startDate = todayKey();
      onChange([...books, newBook]);

function getDaysInRange(mode, param) {
  if (mode === "day") {
    return [new Date(param + "T12:00:00")];
  }
  if (mode === "week") {
    // param = "YYYY-Www" or offset
    const off = parseInt(param) || 0;
    return getWeekDays(off);
  }
  if (mode === "month") {
    const [y, m] = param.split("-").map(Number);
    return getMonthDays(y, m - 1);
  }
  return [];
}

function buildExportData(logs, days, meals) {
  return days.map(d => {
    const k = toKey(d);
    const log = getLog(logs, k);
    const macros = calcMacros(log, meals);
    const ex = log.exercises || {};
    const mealSummaries = {};
    meals.forEach(meal => {
      const ml = getMealLog(log, meal.id);
      const items = meal.foodCategories.reduce((a, c) => a.concat((ml.items || {})[c.id] || []), []);
      mealSummaries[meal.label] = {
        status: !ml.logged ? "No registrado" : ml.skippedTraining ? "Sin entreno" : ml.failed ? "Mal" : ml.partial ? "Parcial" : "Bien",
        items: items.map(i => i.name + (i.qty ? " " + i.qty + (i.unit || "") : "")).join(", "),
        note: ml.note || ""
      };
    });
    const quality = calcDayQuality(log);
    return {
      fecha: k,
      diaSemana: new Date(k + "T12:00:00").toLocaleDateString("es-CR", { weekday:"long" }),
      calidad: quality === "good" ? "Bueno" : quality === "regular" ? "Regular" : quality === "bad" ? "Dificil" : "Sin datos",
      agua: log.water || 0,
      levantada: log.wake || "No registrado",
      cardio: ex.cardio ? "Si" : "No",
      pesas_sup: ex.pesas_sup ? "Si" : "No",
      pesas_inf: ex.pesas_inf ? "Si" : "No",
      gluteos: ex.gluteos ? "Si" : "No",
      abdomen: ex.abdomen ? "Si" : "No",
      macros,
      meals: mealSummaries,
      antojos: (log.extraFoods || []).map(e => e.name + (e.qty ? " " + e.qty : "") + " (" + (e.macroType || "otro") + ")").join(", ")
    };
  });
}

function exportToCSV(rows, meals) {
  const mealCols = meals.flatMap(m => [m.label + " estado", m.label + " alimentos"]);
  const headers = [
    "Fecha","Dia","Calidad","Agua (botellas)","Levantada",
    "Cardio","Pesas Sup","Pesas Inf","Gluteos","Abdomen",
    "Proteina (porc)","Carbo (porc)","Grasa buena (porc)","Grasa mala (porc)","Azucar (porc)",
    ...mealCols,
    "Antojos"
  ];
  const csvRows = rows.map(r => {
    const mealVals = meals.flatMap(m => {
      const ms = r.meals[m.label] || {};
      return [ms.status || "", ms.items || ""];
    });
    return [
      r.fecha, r.diaSemana, r.calidad, r.agua, r.levantada,
      r.cardio, r.pesas_sup, r.pesas_inf, r.gluteos, r.abdomen,
      r.macros.proteina, r.macros.carbo, r.macros.grasa_buena, r.macros.grasa_mala, r.macros.azucar,
      ...mealVals,
      r.antojos
    ].map(v => '"' + String(v).replace(/"/g, '""') + '"');
  });
  return [headers.map(h => '"' + h + '"').join(","), ...csvRows.map(r => r.join(","))].join("\n");
}

function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ── ExportModal ────────────────────────────────────────────────────────────────
function ExportModal({ logs, onClose }) {
  const today = todayKey();
  const now = new Date();
  const [mode, setMode] = useState("week");
  const [dayVal, setDayVal] = useState(today);
  const [weekOff, setWeekOff] = useState(0);
  const [monthVal, setMonthVal] = useState(now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0"));
  const [exporting, setExporting] = useState(null);

  const getPreviewDays = () => {
    if (mode === "day") return [new Date(dayVal + "T12:00:00")];
    if (mode === "week") return getWeekDays(weekOff);
    if (mode === "month") {
      const [y, m] = monthVal.split("-").map(Number);
      return getMonthDays(y, m - 1);
    }
    return [];
  };

  const days = getPreviewDays();
  const periodLabel = () => {
    if (mode === "day") return new Date(dayVal + "T12:00:00").toLocaleDateString("es-CR", { weekday:"long", day:"numeric", month:"long" });
    if (mode === "week") {
      const wk = getWeekDays(weekOff);
      return fmt(wk[0]) + " - " + fmt(wk[6]);
    }
    if (mode === "month") {
      const [y, m] = monthVal.split("-").map(Number);
      return MONTH_ES[m - 1] + " " + y;
    }
  };

  const doExport = (format) => {
    setExporting(format);
    setTimeout(() => {
      try {
        const rows = buildExportData(logs, days, DEFAULT_MEALS);
        const safePeriod = periodLabel().replace(/[^a-zA-Z0-9\-]/g, "_");
        if (format === "csv") {
          const csv = exportToCSV(rows, DEFAULT_MEALS);
          downloadFile("\uFEFF" + csv, "mi_rutina_" + safePeriod + ".csv", "text/csv;charset=utf-8");
        } else {
          // Build simple HTML table for PDF print
          const mealCols = DEFAULT_MEALS.flatMap(m => [
            "<th>" + m.label + " estado</th>",
            "<th>" + m.label + " alimentos</th>"
          ]).join("");
          const tableRows = rows.map(r => {
            const mealVals = DEFAULT_MEALS.flatMap(m => {
              const ms = r.meals[m.label] || {};
              return ["<td>" + (ms.status || "") + "</td>", "<td style='font-size:10px'>" + (ms.items || "-") + "</td>"];
            }).join("");
            return "<tr><td>" + r.fecha + "</td><td>" + r.diaSemana + "</td><td>" + r.calidad + "</td><td>" + r.agua + "</td><td>" + r.levantada + "</td><td>" + r.cardio + "</td><td>" + r.pesas_sup + "</td><td>" + r.pesas_inf + "</td><td>" + r.gluteos + "</td><td>" + r.abdomen + "</td><td>" + r.macros.proteina + "</td><td>" + r.macros.carbo + "</td><td>" + r.macros.grasa_buena + "</td><td>" + r.macros.grasa_mala + "</td><td>" + r.macros.azucar + "</td>" + mealVals + "<td style='font-size:10px'>" + (r.antojos || "-") + "</td></tr>";
          }).join("");
          const html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Mi Rutina - " + periodLabel() + "</title><style>body{font-family:Arial,sans-serif;font-size:11px;padding:20px}h2{color:#333;margin-bottom:4px}p{color:#666;margin-bottom:12px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:5px 7px;text-align:left}th{background:#f5f5f5;font-weight:700;font-size:10px}tr:nth-child(even){background:#fafafa}td{color:#333}</style></head><body><h2>Mi Rutina</h2><p>" + periodLabel() + " — " + rows.length + " dias</p><table><thead><tr><th>Fecha</th><th>Dia</th><th>Calidad</th><th>Agua</th><th>Levantada</th><th>Cardio</th><th>P.Sup</th><th>P.Inf</th><th>Gluteos</th><th>Abdomen</th><th>Proteina</th><th>Carbo</th><th>G.Buena</th><th>G.Mala</th><th>Azucar</th>" + mealCols + "<th>Antojos</th></tr></thead><tbody>" + tableRows + "</tbody></table></body></html>";
          downloadFile(html, "mi_rutina_" + safePeriod + ".html", "text/html;charset=utf-8");
        }
      } catch (e) { console.error(e); }
      setExporting(null);
    }, 100);
  };

  const wkDays = getWeekDays(weekOff);

  return (
    <Modal onClose={onClose} title="Exportar resumen" subtitle="Elegí el periodo y formato" color="#a78bfa">
      {/* Mode selector */}
      <div style={{ display:"flex", gap:6, marginBottom:16 }}>
        {[["day","Por dia"],["week","Por semana"],["month","Por mes"]].map(([m, l]) => (
          <button key={m} onClick={() => setMode(m)} style={{ flex:1, padding:"9px 4px", borderRadius:10, border:"1.5px solid " + (mode === m ? "#a78bfa60" : "rgba(255,255,255,.08)"), background:mode === m ? "rgba(167,139,250,.12)" : "rgba(255,255,255,.03)", color:mode === m ? "#a78bfa" : "#ffffff35", fontSize:12, fontWeight:mode === m ? 700 : 500, cursor:"pointer" }}>
            {l}
          </button>
        ))}
      </div>

      {/* Day picker */}
      {mode === "day" && (
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:10, color:"#ffffff30", marginBottom:7, fontWeight:600, letterSpacing:1 }}>SELECCIONAR DIA</div>
          <input type="date" value={dayVal} max={today} onChange={e => setDayVal(e.target.value)}
            style={{ width:"100%", padding:"10px 12px", borderRadius:11, border:"1px solid rgba(255,255,255,.1)", background:"rgba(255,255,255,.05)", color:"#e4ddd4", fontSize:13, outline:"none", boxSizing:"border-box", colorScheme:"dark" }}/>
        </div>
      )}

      {/* Week picker */}
      {mode === "week" && (
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:10, color:"#ffffff30", marginBottom:7, fontWeight:600, letterSpacing:1 }}>SELECCIONAR SEMANA</div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <button onClick={() => setWeekOff(o => o - 1)} style={{ width:36, height:36, borderRadius:9, border:"1px solid rgba(255,255,255,.09)", background:"rgba(255,255,255,.04)", color:"#fff", fontSize:16, cursor:"pointer" }}>{"<"}</button>
            <div style={{ flex:1, textAlign:"center", padding:"9px", background:"rgba(255,255,255,.04)", borderRadius:10, border:"1px solid rgba(255,255,255,.07)" }}>
              <div style={{ fontSize:12, fontWeight:700, color:"#fff" }}>{weekOff === 0 ? "Esta semana" : weekOff === -1 ? "Semana pasada" : "Hace " + Math.abs(weekOff) + " semanas"}</div>
              <div style={{ fontSize:10, color:"#ffffff35", marginTop:2 }}>{fmt(wkDays[0])} - {fmt(wkDays[6])}</div>
            </div>
            <button onClick={() => setWeekOff(o => Math.min(0, o + 1))} style={{ width:36, height:36, borderRadius:9, border:"1px solid rgba(255,255,255,.09)", background:"rgba(255,255,255,.04)", color:weekOff < 0 ? "#fff" : "#ffffff20", fontSize:16, cursor:"pointer" }}>{">"}</button>
          </div>
        </div>
      )}

      {/* Month picker */}
      {mode === "month" && (
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:10, color:"#ffffff30", marginBottom:7, fontWeight:600, letterSpacing:1 }}>SELECCIONAR MES</div>
          <input type="month" value={monthVal} max={now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2,"0")} onChange={e => setMonthVal(e.target.value)}
            style={{ width:"100%", padding:"10px 12px", borderRadius:11, border:"1px solid rgba(255,255,255,.1)", background:"rgba(255,255,255,.05)", color:"#e4ddd4", fontSize:13, outline:"none", boxSizing:"border-box", colorScheme:"dark" }}/>
        </div>
      )}

      {/* Preview */}
      <div style={{ background:"rgba(167,139,250,.07)", borderRadius:11, padding:"10px 13px", border:"1px solid rgba(167,139,250,.15)", marginBottom:16 }}>
        <div style={{ fontSize:10, color:"#a78bfa", fontWeight:700, marginBottom:3 }}>Vista previa del periodo</div>
        <div style={{ fontSize:12, color:"#ffffff60" }}>{periodLabel()}</div>
        <div style={{ fontSize:10, color:"#ffffff30", marginTop:2 }}>{days.length} dia{days.length !== 1 ? "s" : ""} — habitos + alimentacion + macros</div>
      </div>

      {/* Format buttons */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
        <button onClick={() => doExport("csv")} disabled={!!exporting}
          style={{ padding:"13px", borderRadius:13, border:"1px solid rgba(74,222,128,.3)", background:"rgba(74,222,128,.1)", color:exporting === "csv" ? "#ffffff50" : "#4ade80", fontSize:13, fontWeight:700, cursor:exporting ? "default" : "pointer" }}>
          {exporting === "csv" ? "Generando..." : "Excel / CSV"}
          <div style={{ fontSize:9, fontWeight:400, marginTop:3, opacity:.7 }}>Abrir en Excel o Sheets</div>
        </button>
        <button onClick={() => doExport("html")} disabled={!!exporting}
          style={{ padding:"13px", borderRadius:13, border:"1px solid rgba(248,113,113,.3)", background:"rgba(248,113,113,.1)", color:exporting === "html" ? "#ffffff50" : "#f87171", fontSize:13, fontWeight:700, cursor:exporting ? "default" : "pointer" }}>
          {exporting === "html" ? "Generando..." : "PDF listo"}
          <div style={{ fontSize:9, fontWeight:400, marginTop:3, opacity:.7 }}>HTML para imprimir como PDF</div>
        </button>
      </div>
      <div style={{ fontSize:9, color:"#ffffff20", textAlign:"center", marginTop:10, lineHeight:1.5 }}>
        El archivo CSV se abre directo en Excel o Google Sheets.
        El HTML lo abris en Safari y usas Compartir → Imprimir → Guardar como PDF.
      </div>
    </Modal>
  );
}

// ── DashCard ───────────────────────────────────────────────────────────────────
function DashCard({ color, done, emoji, label, sub, onMore, children }) {
  return (
    <div style={{ borderRadius:18, padding:"13px 15px", background:done?color+"0f":"rgba(255,255,255,.03)", border:"1.5px solid "+(done?color+"35":"rgba(255,255,255,.07)"), transition:"all .3s" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
        <div style={{ display:"flex", gap:9, alignItems:"center" }}>
          <span style={{ fontSize:20 }}>{emoji}</span>
          <div>
            <div style={{ fontSize:13, fontWeight:700, color:done?color:"#ffffff55" }}>{label}</div>
            <div style={{ fontSize:9, color:done?color+"80":"#ffffff25", marginTop:1 }}>{sub}</div>
          </div>
        </div>
        {onMore && (
          <button onClick={onMore} style={{ fontSize:9, color:"#ffffff20", background:"none", border:"1px solid rgba(255,255,255,.07)", cursor:"pointer", padding:"4px 9px", borderRadius:7 }}>ver más ›</button>

}

// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [logs,       setLogs]       = useState({});
  const [customSug,  setCustomSug]  = useState({});
  const [foodLib,    setFoodLib]    = useState({});
  const [books,      setBooks]      = useState([]);
  const [section,    setSection]    = useState("habits");
  const [view,       setView]       = useState("daily");
  const [weekOff,    setWeekOff]    = useState(0);
  const [monOff,     setMonOff]     = useState(0);
  const [foodDate,   setFoodDate]   = useState(todayKey());
  const [habitDate,  setHabitDate]  = useState(todayKey());
  const [loaded,     setLoaded]     = useState(false);
  const [toast,      setToast]      = useState(null);
  const [showExport, setShowExport] = useState(false);
  const toastRef = useRef(null);
  const today = todayKey();

  useEffect(() => {
    (async () => {
      try {
        const raw = localStorage.getItem("rutina_v5"); const r = raw ? { value: raw } : null;
        if (r && r.value) {
          const d = JSON.parse(r.value);
          setLogs(d.logs || {});
          setCustomSug(d.customSug || {});
          setFoodLib(d.foodLib || {});
          setBooks(d.books || []);
        }
      } catch (_) {}
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try { localStorage.setItem("rutina_v5", JSON.stringify({ logs, customSug, foodLib, books })); } catch (_) {}
    })();
  }, [logs, customSug, foodLib, books, loaded]);

  const upd = (key, fn) => setLogs(p => ({ ...p, [key]:fn(getLog(p, key)) }));
  const td  = (fn) => upd(habitDate, fn);
  const fd  = (fn) => upd(foodDate, fn);
  const boom = (msg) => { clearTimeout(toastRef.current); setToast(msg); toastRef.current = setTimeout(() => setToast(null), 2200); };

  const addWater  = (d) => td(l => { const n = Math.max(0, Math.min(5, (l.water || 0) + d)); if (d > 0 && n === 3) boom("Meta de hidratacion!"); return { ...l, water:n }; });
  const setWake   = (v) => td(l => { if (l.wake === v) return { ...l, wake:null }; boom("Levantada registrada"); return { ...l, wake:v }; });
  const toggleEx  = (k, dk = habitDate) => upd(dk, l => { const exs = { ...(l.exercises || {}), [k]:!((l.exercises || {})[k]) }; if (!((l.exercises || {})[k]) && Object.values(exs).filter(Boolean).length === 1) boom("Entrenamiento registrado!"); return { ...l, exercises:exs }; });
  const updMeal   = (id, val) => fd(l => ({ ...l, mealLogs:{ ...(l.mealLogs || {}), [id]:val } }));
  const updExtras = (val) => fd(l => ({ ...l, extraFoods:val }));
  const updateSug = (key, list) => setCustomSug(p => ({ ...p, [key]:list }));
  const saveLib   = (key, name, remove = false) => setFoodLib(p => {
    const cur = p[key] || [];
    if (remove) return { ...p, [key]:cur.filter(x => x !== name) };
    if (cur.includes(name)) return p;
    return { ...p, [key]:[...cur, name] };
  });

  const habitLog = getLog(logs, habitDate);
  const isHabitToday = habitDate === today;
  const foodLog  = getLog(logs, foodDate);
  const isToday  = foodDate === today;

  const updSleep     = (val) => upd(habitDate, l => ({ ...l, sleep:val }));
  const updReading   = (val) => upd(habitDate, l => ({ ...l, reading:val }));
  const updMeditation= (val) => upd(habitDate, l => ({ ...l, meditation:val }));
  const updSkincare  = (val) => upd(habitDate, l => ({ ...l, skincare:val }));
  const updJournaling= (val) => upd(habitDate, l => ({ ...l, journaling:val }));

  // Streaks
  const streakWater    = calcStreak(logs, l => (l.water || 0) >= 3);
  const streakReading  = calcStreak(logs, l => l.reading && l.reading.done);
  const streakMed      = calcStreak(logs, l => l.meditation && l.meditation.done);
  const streakExercise = calcStreak(logs, l => Object.values(l.exercises || {}).some(Boolean));

  const quality = calcDayQuality(foodLog);
  const Q = QUALITY[quality];
  const macros = calcMacros(foodLog, DEFAULT_MEALS);
  const weeklyVariety = calcWeeklyVariety(logs);

  const weekDays = getWeekDays(weekOff);
  const wLabel   = weekOff === 0 ? "Esta semana" : weekOff === -1 ? "Semana pasada" : "Hace " + Math.abs(weekOff) + " sem.";
  const wCardio  = weekDays.filter(d => (getLog(logs, toKey(d)).exercises || {}).cardio).length;
  const wPesas   = weekDays.reduce((a, d) => { const e = getLog(logs, toKey(d)).exercises || {}; return a + (e.pesas_sup ? 1 : 0) + (e.pesas_inf ? 1 : 0) + (e.gluteos ? 1 : 0); }, 0);
  const wWater   = weekDays.reduce((a, d) => a + (getLog(logs, toKey(d)).water || 0), 0);

  const now2   = new Date();
  const mMon   = ((now2.getMonth() + monOff) % 12 + 12) % 12;
  const mYear  = now2.getFullYear() + Math.floor((now2.getMonth() + monOff) / 12);
  const mDays  = getMonthDays(mYear, mMon);
  const mLabel = MONTH_ES[mMon] + " " + mYear;

  const mainLogged = MAIN_MEALS.map(id => getMealLog(foodLog, id));
  const mainBad    = mainLogged.filter(ml => ml.logged && ml.failed).length;
  const extras     = (foodLog.extraFoods || []).length;

  const heatColor = (key) => {
    const q = calcDayQuality(getLog(logs, key));
    if (q === "good") return "#166534";
    if (q === "regular") return "#713f12";
    if (q === "bad") return "#7f1d1d";
    return "#0f0f17";
  };

  const pendingDesc = mainBad + " mal, " + extras + " antojo" + (extras !== 1 ? "s" : "") + ", en progreso";

  return (
    <div style={{ minHeight:"100vh", background:"#080810", fontFamily:"'DM Sans','Segoe UI',sans-serif", color:"#f1f0f5", overflowX:"hidden" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { display: none; }
        textarea, input, select, button { font-family: 'DM Sans', sans-serif; }
        @keyframes slideUp { from { opacity:0; transform:translateY(11px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,.16); }
        select option { background: #1a1830; }
      `}</style>

      <div style={{ position:"fixed", inset:0, pointerEvents:"none", overflow:"hidden", zIndex:0 }}>
        <div style={{ position:"absolute", width:500, height:500, borderRadius:"50%", background:"radial-gradient(circle,#7c3aed0e,transparent 70%)", top:-120, right:-100 }}/>
        <div style={{ position:"absolute", width:400, height:400, borderRadius:"50%", background:"radial-gradient(circle,#0596690e,transparent 70%)", bottom:-80, left:-80 }}/>
      </div>

      {toast && (
        <div style={{ position:"fixed", top:18, left:"50%", transform:"translateX(-50%)", background:"rgba(18,16,36,.95)", backdropFilter:"blur(12px)", border:"1px solid rgba(255,255,255,.1)", color:"#fff", padding:"9px 20px", borderRadius:99, fontSize:12, fontWeight:600, zIndex:9999, whiteSpace:"nowrap", animation:"fadeIn .2s ease" }}>
          {toast}
        </div>
      )}

      {showExport && <ExportModal logs={logs} onClose={() => setShowExport(false)}/>}

      <div style={{ position:"relative", zIndex:1 }}>

        {/* HEADER */}
        <div style={{ padding:"26px 17px 0", maxWidth:580, margin:"0 auto" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16 }}>
            <div>
              <div style={{ fontSize:9, letterSpacing:3, color:"#ffffff15", textTransform:"uppercase", marginBottom:3, fontWeight:600 }}>SEGUIMIENTO PERSONAL</div>
              <h1 style={{ fontSize:23, fontWeight:700, color:"#fff", letterSpacing:-1 }}>Mi Rutina</h1>
              <div style={{ fontSize:11, color:"#ffffff30", marginTop:3, textTransform:"capitalize" }}>
                {new Date().toLocaleDateString("es-CR", { weekday:"long", day:"numeric", month:"long" })}
              </div>
            </div>
            <div style={{ textAlign:"center", background:Q.bg, border:"1.5px solid " + Q.border, borderRadius:13, padding:"8px 12px", minWidth:72 }}>
              <div style={{ fontSize:20, marginBottom:1 }}>{Q.emoji}</div>
              <div style={{ fontSize:8, color:Q.color, fontWeight:700 }}>
                {quality === "good" ? "DIA BUENO" : quality === "regular" ? "REGULAR" : quality === "bad" ? "DIFICIL" : "EN PROG."}
              </div>
            </div>
          </div>

          <div style={{ display:"flex", gap:6 }}>
            <div style={{ flex:1, overflowX:"auto", WebkitOverflowScrolling:"touch", scrollbarWidth:"none" }}>
              <div style={{ display:"flex", gap:5, background:"rgba(255,255,255,.04)", borderRadius:12, padding:3, border:"1px solid rgba(255,255,255,.05)", minWidth:"max-content" }}>
                {[["habits","🏃 Hábitos"],["planning","📋 Plan"],["food","🥗 Alimentación"],["reading","📚 Lectura"],["exercise","💪 Ejercicio"],["selfcare","🌿 Cuidado"],["home","🏠 Hogar"],["spirit","✨ Espirit."],["finance","💰 Finanzas"]].map(([s,l]) => (
                  <button key={s} onClick={() => setSection(s)}
                    style={{ padding:"9px 11px", borderRadius:10, border:"none", cursor:"pointer", background:section===s?"rgba(255,255,255,.12)":"none", color:section===s?"#fff":"#ffffff28", fontSize:11, fontWeight:section===s?700:500, transition:"all .2s", whiteSpace:"nowrap" }}>
                    {l}
                  </button>
                ))}
              </div>
            </div>
            <button onClick={() => setShowExport(true)} style={{ width:44, height:44, borderRadius:12, border:"1px solid rgba(255,255,255,.1)", background:"rgba(255,255,255,.05)", color:"#ffffff60", fontSize:18, cursor:"pointer", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
              ↓
            </button>
          </div>

          {/* Streaks row */}
          {(streakWater > 0 || streakExercise > 0 || streakReading > 0 || streakMed > 0) && (
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginTop:8 }}>
              <StreakBadge label="Agua" streak={streakWater}    color="#38bdf8" emoji="💧"/>
              <StreakBadge label="Ejercicio" streak={streakExercise} color="#a78bfa" emoji="💪"/>
              <StreakBadge label="Lectura" streak={streakReading}  color="#4ade80" emoji="📚"/>
              <StreakBadge label="Meditacion" streak={streakMed} color="#38bdf8" emoji="🧘"/>
            </div>
          )}
        </div>

        <div style={{ maxWidth:580, margin:"0 auto", padding:"13px 17px 80px" }}>

          {/* ══ HABITS ══ */}
          {section === "habits" && (
            <>
              <div style={{ display:"flex", background:"rgba(255,255,255,.03)", borderRadius:10, padding:3, marginBottom:13, border:"1px solid rgba(255,255,255,.05)" }}>
                {[["daily","Hoy"],["weekly","Semana"],["monthly","Mes"]].map(([v, l]) => (
                  <button key={v} onClick={() => setView(v)} style={{ flex:1, padding:"8px 3px", borderRadius:8, border:"none", cursor:"pointer", background:view === v ? "rgba(255,255,255,.09)" : "none", color:view === v ? "#fff" : "#ffffff20", fontSize:11, fontWeight:view === v ? 700 : 500, transition:"all .2s" }}>
                    {l}
                  </button>
                ))}
              </div>

              {view === "daily" && (
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>

                  {/* ── Navegador de fecha ── */}
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <button onClick={() => { const d = new Date(habitDate); d.setDate(d.getDate()-1); setHabitDate(toKey(d)); }}
                      style={{ width:38, height:38, borderRadius:11, border:"1px solid rgba(255,255,255,.09)", background:"rgba(255,255,255,.04)", color:"#fff", fontSize:18, cursor:"pointer", flexShrink:0 }}>{"<"}</button>
                    <div style={{ flex:1, textAlign:"center" }}>
                      <div style={{ fontSize:14, fontWeight:700, color:"#fff" }}>
                        {isHabitToday ? "Hoy" : habitDate === toKey(new Date(new Date().setDate(new Date().getDate()-1))) ? "Ayer"
                          : new Date(habitDate+"T12:00:00").toLocaleDateString("es-CR",{weekday:"long",day:"numeric",month:"long"})}
                      </div>
                      {!isHabitToday && (
                        <button onClick={() => setHabitDate(today)} style={{ fontSize:9, color:"#ffffff35", background:"none", border:"none", cursor:"pointer", textDecoration:"underline", marginTop:2 }}>volver a hoy</button>
                      )}
                    </div>
                    <button onClick={() => { if (habitDate>=today) return; const d=new Date(habitDate); d.setDate(d.getDate()+1); setHabitDate(toKey(d)); }}
                      style={{ width:38, height:38, borderRadius:11, border:"1px solid rgba(255,255,255,.09)", background:"rgba(255,255,255,.04)", color:habitDate>=today?"#ffffff15":"#fff", fontSize:18, cursor:habitDate>=today?"default":"pointer", flexShrink:0 }}>{">"}</button>
                  </div>

                  {/* ── AGUA ── */}
                  <DashCard color="#38bdf8" done={habitLog.water>=3} emoji="💧" label="Agua" sub={habitLog.water+"/3 botellas"} onMore={() => setSection("food")}>
                    <div style={{ display:"flex", gap:5 }}>

                      {quality === "good"    && "Las 3 comidas principales bien y sin antojos."}
                      {quality === "regular" && "Una comida parcial o hay antojos registrados."}
                      {quality === "bad"     && "Dos o mas comidas mal, o una mal y un antojo."}
                      {quality === "pending" && pendingDesc}
                    </div>
                  </div>
                </div>
                <div style={{ display:"flex", gap:5 }}>
                  {MAIN_MEALS.map(id => {
                    const ml = getMealLog(foodLog, id);
                    const meal = DEFAULT_MEALS.find(m => m.id === id);
                    const c = ml.logged ? (ml.failed ? "#f87171" : ml.partial ? "#fbbf24" : "#4ade80") : "rgba(255,255,255,.13)";
                    return (
                      <div key={id} style={{ flex:1, textAlign:"center", padding:"5px 3px", borderRadius:8, background:c + "12", border:"1px solid " + c + "30" }}>
                        <div style={{ fontSize:15 }}>{meal.emoji}</div>
                        <div style={{ fontSize:7, color:c, fontWeight:700, marginTop:1 }}>
                          {ml.logged ? (ml.failed ? "Mal" : ml.partial ? "Parcial" : "Bien") : "Pend."}
                        </div>
                      </div>
                    );
                  })}
                  <div style={{ flex:1, textAlign:"center", padding:"5px 3px", borderRadius:8, background:extras > 0 ? "rgba(248,113,113,.1)" : "rgba(255,255,255,.04)", border:"1px solid " + (extras > 0 ? "rgba(248,113,113,.3)" : "rgba(255,255,255,.06)") }}>
                    <div style={{ fontSize:15 }}>⚠</div>
                    <div style={{ fontSize:7, color:extras > 0 ? "#f87171" : "#ffffff22", fontWeight:700, marginTop:1 }}>{extras} ant.</div>
                  </div>
                </div>
              </div>

              <MacroDash macros={macros} weeklyVariety={weeklyVariety}/>

              <div style={{ display:"flex", flexDirection:"column", gap:8, margin:"11px 0" }}>
                {DEFAULT_MEALS.map((meal, idx) => (
                  <MealCard key={meal.id + foodDate} meal={meal} mealLog={getMealLog(foodLog, meal.id)} onChange={val => updMeal(meal.id, val)} idx={idx}
                    customSug={customSug} onUpdateSug={updateSug} foodLib={foodLib} onSaveLib={saveLib}/>
                ))}
              </div>

              <ExtraLogger extras={foodLog.extraFoods || []} onChange={updExtras} foodLib={foodLib} onSaveLib={saveLib}/>

              <div style={{ marginTop:11, background:"rgba(255,255,255,.02)", borderRadius:15, padding:"13px", border:"1px solid rgba(255,255,255,.04)" }}>
                <div style={{ fontSize:9, color:"#ffffff18", letterSpacing:2, textTransform:"uppercase", fontWeight:600, marginBottom:10 }}>Esta semana — toca un dia para verlo</div>
                <div style={{ display:"flex", gap:5 }}>
                  {getWeekDays(0).map((d, i) => {
                    const k = toKey(d), q = calcDayQuality(getLog(logs, k)), Qd = QUALITY[q], isFut = k > today, isSelected = k === foodDate;
                    return (
                      <div key={i} onClick={() => !isFut && setFoodDate(k)} style={{ flex:1, textAlign:"center", cursor:isFut ? "default" : "pointer" }}>
                        <div style={{ fontSize:7, color:isSelected ? "#fff" : "#ffffff18", marginBottom:3, fontWeight:isSelected ? 700 : 400 }}>{DAY_ES[i]}</div>
                        <div style={{ aspectRatio:"1", borderRadius:8, background:isFut ? "rgba(255,255,255,.02)" : Qd.bg, border:isSelected ? "2px solid " + Qd.color + "90" : "2px solid " + (isFut ? "rgba(255,255,255,.03)" : Qd.border), display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, opacity:isFut ? 0.18 : 1, transform:isSelected ? "scale(1.1)" : "scale(1)", transition:"all .15s" }}>
                          {isFut ? "" : Qd.emoji}
                        </div>
                        <div style={{ fontSize:7, color:isSelected ? "#ffffff50" : "#ffffff12", marginTop:2 }}>{d.getDate()}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </>
          )}

          {/* ══ READING ══ */}
          {section === "reading" && (
            <>
              <div style={{ marginBottom:13 }}>
                <div style={{ fontSize:11, letterSpacing:2, color:"#4ade8060", textTransform:"uppercase", fontWeight:600, marginBottom:3 }}>Biblioteca personal</div>
                <div style={{ fontSize:18, fontWeight:700, color:"#fff" }}>Lectura</div>
              </div>
              <ReadingStats books={books}/>
              <ReadingLibrary books={books} onChange={setBooks}/>
            </>
          )}

          {/* ══ EXERCISE ══ */}
          {section === "exercise" && <ComingSoon emoji="💪" title="Ejercicio" color="#f87171" desc="Rutinas detalladas, series, repeticiones y peso. Proximamente." />}

          {/* ══ SELFCARE ══ */}
          {section === "selfcare" && <ComingSoon emoji="🌿" title="Cuidado Personal" color="#fb7185" desc="Skincare, bienestar, citas medicas y rutinas de autocuidado. Proximamente." />}

          {/* ══ HOME ══ */}
          {section === "home" && <ComingSoon emoji="🏠" title="Hogar" color="#fbbf24" desc="Limpieza, compras, tareas del hogar y mantenimiento. Proximamente." />}

          {/* ══ FINANCE ══ */}
          {section === "finance" && <ComingSoon emoji="💰" title="Finanzas" color="#4ade80" desc="Ingresos, gastos, metas de ahorro y presupuesto mensual. Proximamente." />}

          {/* ══ PLANNING ══ */}
          {section === "planning" && <ComingSoon emoji="📋" title="Planificacion" color="#38bdf8" desc="Metas semanales, tareas pendientes y proyectos. Proximamente." />}

          {/* ══ SPIRIT ══ */}
          {section === "spirit" && <ComingSoon emoji="✨" title="Espiritualidad" color="#c084fc" desc="Oracion, meditacion profunda, gratitud y crecimiento espiritual. Proximamente." />}

        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
